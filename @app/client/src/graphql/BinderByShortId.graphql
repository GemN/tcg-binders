query BinderByShortId(
  $shortId: String!
  $cardFirst: Int!
  $cardOffset: Int!
  $cardOrderBy: [BinderCardsOrderBy!]!
) {
  binderByShortId(binderShortId: $shortId) {
    id
    nodeId
    name
    ownerId
    shortId
    tcgId
  }
  binderCardCountByShortId(binderShortId: $shortId)
  binderCardsByShortId(
    binderShortId: $shortId
    first: $cardFirst
    offset: $cardOffset
    orderBy: $cardOrderBy
  ) {
    pageInfo {
      hasNextPage
    }
    edges {
      node {
        id
        nodeId
        finish
        position
        priceAmount
        priceCurrency
        quantity
        card {
          id
          name
          collectorNumber
          imageNormalUrl
          imageSmallUrl
          releasedAt
          cardSet {
            code
            name
          }
          marketPrices(first: 12, orderBy: [{ source: AscNullsLast }]) {
            edges {
              node {
                source
                finish
                amount
                currency
                priceDate
              }
            }
          }
        }
      }
    }
  }
}

query BinderByShortId(
  $shortId: String!
  $cardFirst: Int!
  $cardOrderBy: [BinderCardsOrderBy!]!
) {
  binderByShortId(binderShortId: $shortId) {
    id
    nodeId
    name
    ownerId
    shortId
    tcgId
  }
  binderCardCountByShortId(binderShortId: $shortId)
  binderCardsByShortId(
    binderShortId: $shortId
    first: $cardFirst
    orderBy: $cardOrderBy
  ) {
    pageInfo {
      hasNextPage
    }
    edges {
      node {
        id
        nodeId
        finish
        position
        quantity
        card {
          id
          name
          collectorNumber
          imageNormalUrl
          imageSmallUrl
          releasedAt
          cardSet {
            code
            name
          }
        }
      }
    }
  }
}

query BinderCardFilteredCount(
  $shortId: String!
  $cardFirst: Int!
  $cardOffset: Int!
  $cardOrderBy: [BinderCardsOrderBy!]
  $cardFilter: BinderCardsFilter
) {
  binderCardsByShortId(
    binderShortId: $shortId
    first: $cardFirst
    offset: $cardOffset
    orderBy: $cardOrderBy
    filter: $cardFilter
  ) {
    pageInfo {
      hasNextPage
    }
    edges {
      node {
        id
      }
    }
  }
}

query BinderCardDetailWindow(
  $shortId: String!
  $cardFirst: Int!
  $cardOffset: Int!
  $cardOrderBy: [BinderCardsOrderBy!]!
  $cardFilter: BinderCardsFilter
) {
  binderCardsByShortId(
    binderShortId: $shortId
    first: $cardFirst
    offset: $cardOffset
    orderBy: $cardOrderBy
    filter: $cardFilter
  ) {
    edges {
      node {
        ...BinderCardDetailFields
      }
    }
  }
}

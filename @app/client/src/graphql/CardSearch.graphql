query CardSearch(
  $query: String!
  $nameQuery: String!
  $setCode: String!
  $hasSetCode: Boolean!
  $first: Int = 8
) {
  cardsCollection(
    first: $first
    filter: { tcgId: { eq: "mtg" }, name: { ilike: $query } }
    orderBy: [{ releasedAt: DescNullsLast }, { name: AscNullsLast }]
  ) {
    edges {
      node {
        ...CardSearchFields
      }
    }
  }
  cardSetsCollection(
    first: 1
    filter: { tcgId: { eq: "mtg" }, code: { eq: $setCode } }
  ) @include(if: $hasSetCode) {
    edges {
      node {
        id
        cards(
          first: $first
          filter: { tcgId: { eq: "mtg" }, name: { ilike: $nameQuery } }
          orderBy: [{ releasedAt: DescNullsLast }, { name: AscNullsLast }]
        ) {
          edges {
            node {
              ...CardSearchFields
            }
          }
        }
      }
    }
  }
}

fragment CardSearchFields on Cards {
  id
  externalId
  name
  collectorNumber
  rarity
  finishes
  imageUrl
  releasedAt
  cardSet {
    id
    code
    name
    releaseAt
  }
  mtgCardDetail {
    scryfallId
    typeLine
    oracleText
  }
  marketPrices(first: 8, orderBy: [{ source: AscNullsLast }]) {
    edges {
      node {
        source
        finish
        amount
        currency
        priceDate
        buyUrl
      }
    }
  }
}
